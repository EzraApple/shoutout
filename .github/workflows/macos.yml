name: macOS

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: |
          xcode-select -p
          swift --version

      - name: Static checks
        run: SKIP_SWIFTPM=true ./scripts/test.sh

      - name: Unit tests
        run: cd apps/macos && swift test

      - name: Build Swift package
        run: cd apps/macos && swift build

      - name: Build app bundle
        run: cd apps/macos && UNIVERSAL=false SKIP_NOTARIZE=true ./scripts/build-app.sh

      - name: Archive app bundle
        run: ditto -c -k --keepParent "apps/macos/dist/ShoutOut.app" apps/macos/dist/ShoutOut-app.zip

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: ShoutOut-app
          path: apps/macos/dist/ShoutOut-app.zip
          if-no-files-found: error
